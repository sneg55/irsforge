# IRSForge marketing site — Cloudflare Pages config.
#
# First-time setup (one time):
#   1. wrangler login
#   2. wrangler pages project create irsforge-site --production-branch=main
#   3. Set custom domain irsforge.com in the Cloudflare Pages dashboard
#   4. Configure DNS: irsforge.com CNAME irsforge-site.pages.dev
#
# After that:  make site-deploy

name = "irsforge-site"
compatibility_date = "2026-04-25"
pages_build_output_dir = "./dist"

[vars]
NODE_VERSION = "20"

# Reference-deployment workflow for the marketing site at irsforge.com.
# Path-scoped: only fires when site/ (or this workflow) changes.
# Integrator note: this is the maintainer's deploy pipeline. Forks bringing
# their own Cloudflare account should swap CLOUDFLARE_* secrets and the
# project name; downstream integrators are expected to supply their own
# `.github/workflows/` per the BYO-integrator filter.

name: deploy-site

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/deploy-site.yml"
  workflow_dispatch: {}

concurrency:
  group: deploy-site
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4

      # site/ has no committed package-lock.json — `npm install` instead
      # of `npm ci`, no cache config (would require a lockfile).
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # --ignore-scripts skips the root prepare:husky hook that fires
      # because site/ is an npm workspace (root walks up). Astro has
      # no deps that need lifecycle scripts.
      - name: Install
        run: npm install --no-audit --no-fund --ignore-scripts

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: site
          command: pages deploy dist --project-name=irsforge-site --branch=main --commit-dirty=true

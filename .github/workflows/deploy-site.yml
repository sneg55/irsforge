# Reference-deployment workflow for the marketing site at irsforge.com.
# Path-scoped: only fires when site/ (or this workflow) changes.
# Integrator note: this is the maintainer's deploy pipeline. Forks bringing
# their own Cloudflare account should swap CLOUDFLARE_* secrets and the
# project name; downstream integrators are expected to supply their own
# `.github/workflows/` per the BYO-integrator filter.

name: deploy-site

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/deploy-site.yml"
  workflow_dispatch: {}

concurrency:
  group: deploy-site
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      # site/ is an npm workspace; the lockfile lives at repo root, so
      # install runs from root and scopes to the site workspace +
      # root-level devDeps (husky etc.).
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install (site workspace + root)
        run: npm ci --workspace=site --include-workspace-root --no-audit --no-fund

      - name: Build
        run: npm run build --workspace=site

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: site
          command: pages deploy dist --project-name=irsforge-site --branch=main --commit-dirty=true

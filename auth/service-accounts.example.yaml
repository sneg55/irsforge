# Service-accounts registry (OAuth2 client-credentials — RFC 6749 §4.4).
#
# Mounted by the auth service at $PWD/service-accounts.yaml in non-demo
# profiles. Each entry pairs with auth.serviceAccounts[id=...] in
# irsforge.yaml; secrets live here (bcrypt hashes), party authorizations
# live in irsforge.yaml. The real file is gitignored.
#
# Generate a hash:
#   node -e 'require("bcrypt").hash(process.argv[1],10).then(console.log)' "my-secret"
#
# Oracle env vars (pass the RAW secret, not the hash):
#   SERVICE_CLIENT_SECRET_SCHEDULER=my-scheduler-secret
#   SERVICE_CLIENT_SECRET_MARK_PUBLISHER=my-mark-secret

accounts:
  - id: scheduler
    clientSecretHash: "$2b$10$REPLACE_ME_WITH_BCRYPT_OF_YOUR_SECRET"
  - id: mark-publisher
    clientSecretHash: "$2b$10$REPLACE_ME_WITH_BCRYPT_OF_YOUR_SECRET"

# IRSForge shared-demo compose file — single VPS, single container.
#
# Bring up:    docker compose -f deploy/docker-compose.yml up -d --build
# Tail logs:   docker compose -f deploy/docker-compose.yml logs -f
# Tear down:   docker compose -f deploy/docker-compose.yml down
#
# Reverse proxy / TLS lives outside this compose file — see deploy/README.md
# for the Caddy setup that fronts port 3000 with a public hostname.

services:
  irsforge:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: irsforge-demo:latest
    container_name: irsforge-demo
    # Caddy on the host needs:
    #  - 3000  → Next.js prod (HTTP routes + /api/ledger HTTP proxy)
    #  - 7575  → Canton JSON API (/v1/stream/* WebSocket — Next.js can't
    #            forward WS upgrades, so Caddy reverse-proxies straight
    #            to Canton for these paths)
    # Both bind only to 127.0.0.1 — Caddy is the sole external entry.
    ports:
      - "127.0.0.1:3000:3000"
      - "127.0.0.1:7575:7575"
    environment:
      IRSFORGE_DEPLOY_MODE: prod
      # MUST match platform.demoReset.intervalMinutes in ../irsforge.yaml.
      IRSFORGE_RESET_INTERVAL_MINUTES: "60"
      # Size every JVM the SDK launches (Canton sandbox, Daml json-api,
      # daml-script seed runner). Without this the JVM ergonomics pick a
      # default ~25% of container RAM (~1.9 GB on a 7.6 GB CPX32), which
      # is too tight for Daml-Finance (~30 packages) + daml-script-lts +
      # protobuf decode buffers. Symptom: OOM in
      # `com.daml.lf.archive.Reader.readArchive` 35–45 min into each
      # reset cycle, after package-cache pressure forces archive
      # re-reads — JVM dies, JSON API survives serving
      # ParticipantServerError(UNAVAILABLE) until next reset.
      # ExitOnOutOfMemoryError ensures the wrapper dies cleanly (orphan
      # reaper picks up survivors); HeapDumpOnOutOfMemoryError leaves a
      # post-mortem file if it ever recurs at this ceiling.
      #
      # Using `_JAVA_OPTIONS`, not `JAVA_OPTS`: the daml-helper binary
      # invokes canton.jar via plain `java -jar` and does NOT propagate
      # JAVA_OPTS. _JAVA_OPTIONS is honored by every JVM unconditionally
      # (prints a one-line "Picked up" note to stderr per launch).
      _JAVA_OPTIONS: "-Xms512m -Xmx4g -XX:+ExitOnOutOfMemoryError -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/app/.demo/logs/heap-dump.hprof"
    # Healthcheck pings the Next.js prod server. Container is "healthy"
    # only after Canton boot + seed + warmup completes; first-start can
    # take ~90s, hence the generous start_period.
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 180s
    restart: unless-stopped
    # Canton's JVM occasionally hangs on shutdown; give it 30s to coordinate
    # before SIGKILL.
    stop_grace_period: 30s
